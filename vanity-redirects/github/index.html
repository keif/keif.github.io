<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>

    <!-- Non-JS fallback: meta refresh provides 302-like behavior without JavaScript -->
    <meta http-equiv="refresh" content="1;url=https://github.com/keif">

    <!--
        GoatCounter tracking configuration:
        - data-goatcounter-settings overrides the path to /out/github for clean analytics
        - async ensures script doesn't block page load or redirect
    -->
    <script data-goatcounter="https://stats.baker.is/count"
            data-goatcounter-settings='{"path": "/out/github"}'
            async src="https://stats.baker.is/count.js"></script>
</head>
<body style="font-family: system-ui, sans-serif; text-align: center; padding: 2rem;">
    <div>
        <p>Redirecting to GitHub...</p>
        <p><a href="https://github.com/keif">Click here if you are not redirected</a></p>
    </div>

    <script>
        /*
         * 100ms delay allows GoatCounter to initialize and send the tracking beacon.
         * Modern browsers complete sendBeacon requests even after navigation.
         * window.location.replace() provides 302-style semantics (no history entry).
         */
        setTimeout(function() {
            window.location.replace('https://github.com/keif');
        }, 100);
    </script>
</body>
</html>
